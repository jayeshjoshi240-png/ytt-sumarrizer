<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Summarizer Pro</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06040a 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-primary: linear-gradient(90deg, #ff416c 0%, #ff4b2b 100%);
            --text-main: #f1f1f7;
            --text-muted: #9fa0b5;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wrapper {
            width: 100%;
            max-width: 680px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #ffffff 30%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.05rem;
        }

        .control-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            padding: 14px 18px;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #ff416c;
            box-shadow: 0 0 10px rgba(255, 65, 108, 0.2);
        }

        button {
            background: var(--accent-primary);
            border: none;
            padding: 14px;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        button:hover { opacity: 0.95; }
        button:disabled { background: #3a3a4a; color: var(--text-muted); cursor: not-allowed; }

        .output-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(12px);
            display: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .output-card h3 { margin-top: 0; font-size: 1.3rem; border-bottom: 1px solid var(--card-border); padding-bottom: 12px; color: #fff; }
        .summary-content { line-height: 1.7; color: #e2e2ec; }
        .summary-content ul { padding-left: 20px; margin: 16px 0; }
        .summary-content li { margin-bottom: 10px; }
        .loader { display: none; text-align: center; padding: 20px; color: var(--text-muted); font-style: italic; }
    </style>
</head>
<body>

<div class="wrapper">
    <header>
        <h1>Smart YouTube Summarizer</h1>
        <p class="subtitle">Convert lengthy videos into structural, instant insights powered by Gemini</p>
    </header>

    <div class="control-panel">
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Paste YouTube link here (e.g., https://youtu.be/...)">
            <button id="actionBtn" onclick="processVideo()">Generate AI Summary</button>
        </div>
    </div>

    <div id="loaderStatus" class="loader">⏳ Initializing...</div>
    <div id="outputContainer" class="output-card">
        <h3>✨ Video Insights Matrix</h3>
        <div id="summaryText" class="summary-content"></div>
    </div>
</div>

<script>
    function parseMarkdown(text) {
        let formatted = text
            .replace(/^### (.*$)/gim, '<h4>$1</h4>')
            .replace(/^## (.*$)/gim, '<h3>$1</h3>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/^\s*[\-\*]\s+(.*)$/gim, '<li>$1</li>');
        
        if (formatted.includes('<li>')) {
            formatted = formatted.replace(/([^>])(<li>)/g, '$1<ul>$2').replace(/(<\/li>)(?!<li>)/g, '$1</ul>');
        }
        return formatted.replace(/\n/g, '<br>');
    }

    async function processVideo() {
        const urlInput = document.getElementById('videoUrl').value.trim();
        const actionBtn = document.getElementById('actionBtn');
        const loaderStatus = document.getElementById('loaderStatus');
        const outputContainer = document.getElementById('outputContainer');
        const summaryText = document.getElementById('summaryText');

        if (!urlInput) return alert("Please enter a valid YouTube URL first.");

        outputContainer.style.display = "none";
        loaderStatus.style.display = "block";
        actionBtn.disabled = true;

        try {
            const match = urlInput.match(/(?:youtu\.be\/|v=|\/)([0-9A-Za-z_-]{11})/);
            if (!match) throw new Error("Invalid YouTube URL format.");
            const videoId = match[1];

            loaderStatus.innerHTML = "⏳ <i>Bypassing server blocks and fetching transcript...</i>";

            // Swapped to AllOrigins - a much more stable and reliable proxy
            const targetUrl = encodeURIComponent(`https://youtube-transcript.ai/transcript/${videoId}.txt`);
            const transcriptRes = await fetch(`https://api.allorigins.win/raw?url=${targetUrl}`);
            
            if (!transcriptRes.ok) {
                throw new Error("Captions are completely disabled by the creator for this specific video.");
            }
            const transcriptData = await transcriptRes.text();

            // Safety check: If proxy sends a raw HTML error page instead of text
            if (transcriptData.includes("<!DOCTYPE html>")) {
                 throw new Error("Proxy server error. Please try again in a moment.");
            }

            loaderStatus.innerHTML = "⏳ <i>Transcript secured! Generating AI insights...</i>";

            const response = await fetch('/api/summarize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ transcriptText: transcriptData })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            summaryText.innerHTML = parseMarkdown(data.summary);
            outputContainer.style.display = "block";
        } catch (error) {
            alert(`Error: ${error.message}`);
        } finally {
            loaderStatus.style.display = "none";
            actionBtn.disabled = false;
        }
    }
</script>
</body>
</html>
